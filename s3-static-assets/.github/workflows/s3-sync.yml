name: Sync Static Assets to Amazon S3

on:
  push:
    branches:
      - main

# Permissions required to request temporary credentials via AWS OIDC JWT tokens
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::058264198774:role/GitHubActionsS3SyncRole
          aws-region: us-west-2                                            
          audience: sts.amazonaws.com

      - name: Sync Assets to S3 Bucket
        run: |
          # Syncs the current workspace straight to your bucket, ignoring the hidden .git directory
          aws s3 sync . s3://zeus-app-static-assets --exclude ".git/*" --exclude ".github/*" --delete